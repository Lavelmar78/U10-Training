<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U10 Coaching Session</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: #0d1117; color: #f0f0f0; font-family: 'Helvetica Neue', Arial, sans-serif; max-width: 480px; margin: 0 auto; min-height: 100vh; }

  /* HOME */
  .home-header { background: #161b22; padding: 20px 16px 14px; border-bottom: 2px solid #21262d; }
  .session-label { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; color: #4ade80; text-transform: uppercase; margin-bottom: 4px; }
  .session-title { font-size: 22px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.04em; line-height: 1.15; }
  .session-sub { font-size: 12px; color: #8b949e; margin-top: 4px; }
  .overall-bar { height: 4px; background: #21262d; border-radius: 2px; margin-top: 12px; }
  .overall-fill { height: 100%; background: #4ade80; border-radius: 2px; width: 0%; transition: width 0.5s; }

  .phase-list { padding: 10px 0 100px; }
  .phase-card { margin: 8px 12px; background: #161b22; border-radius: 10px; border: 1px solid #21262d; border-left-width: 3px; display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; }
  .phase-card:active { opacity: 0.75; }
  .phase-num { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 15px; flex-shrink: 0; }
  .phase-info { flex: 1; }
  .phase-title { font-size: 14px; font-weight: 700; color: #fff; }
  .phase-cat { font-size: 11px; color: #8b949e; margin-top: 2px; }
  .phase-mins { font-size: 12px; font-weight: 700; color: #8b949e; }
  .phase-arrow { color: #8b949e; font-size: 16px; margin-left: 2px; }

  .home-footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; padding: 10px 12px; background: #0d1117; border-top: 1px solid #21262d; display: flex; gap: 8px; }
  .btn-start { flex: 1; background: rgba(74,222,128,0.13); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); border-radius: 8px; padding: 11px; font-weight: 700; font-size: 13px; cursor: pointer; }
  .btn-cues-home { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 8px; padding: 11px 18px; font-weight: 700; font-size: 13px; cursor: pointer; }

  /* DRILL */
  .drill-screen { display: none; flex-direction: column; min-height: 100vh; }
  .drill-header { background: #161b22; border-bottom: 1px solid #21262d; }
  .back-btn { background: none; border: none; color: #8b949e; font-size: 13px; cursor: pointer; padding: 12px 14px 6px; display: flex; align-items: center; gap: 4px; }
  .drill-cat { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 0 14px 4px; }
  .drill-title { font-size: 19px; font-weight: 900; text-transform: uppercase; padding: 0 14px 12px; }

  .drill-body { padding-bottom: 80px; overflow-y: auto; }
  .timer-box { margin: 12px 12px 0; background: #161b22; border-radius: 12px; padding: 16px; border: 1px solid #21262d; text-align: center; }
  .timer-btns { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
  .btn-play { border: none; border-radius: 8px; padding: 9px 22px; font-weight: 700; font-size: 13px; cursor: pointer; }
  .btn-reset { background: #21262d; color: #8b949e; border: 1px solid #30363d; border-radius: 8px; padding: 9px 16px; font-weight: 700; font-size: 13px; cursor: pointer; }
  .btn-cues-drill { background: #21262d; color: #8b949e; border: 1px solid #30363d; border-radius: 8px; padding: 9px 14px; font-weight: 700; font-size: 11px; cursor: pointer; }

  .section-head { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #8b949e; padding: 14px 14px 6px; }
  .diagram-wrap { margin: 0 12px; background: #161b22; border-radius: 10px; padding: 12px; border: 1px solid #21262d; }
  .setup-box { margin: 0 12px 4px; background: #161b22; border-radius: 10px; padding: 12px 14px; border: 1px solid #21262d; font-size: 13px; line-height: 1.6; color: #c9d1d9; }
  .point-row { display: flex; gap: 8px; padding: 4px 14px; }
  .point-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 7px; flex-shrink: 0; }
  .point-text { font-size: 13px; line-height: 1.55; color: #c9d1d9; }
  .prog-box { margin: 8px 12px; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #93c5fd; line-height: 1.55; background: rgba(96,165,250,0.08); border: 1px solid rgba(96,165,250,0.2); }

  .drill-footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; display: flex; gap: 8px; padding: 10px 12px; background: #0d1117; border-top: 1px solid #21262d; }
  .btn-prev { flex: 1; background: #21262d; color: #c9d1d9; border: none; border-radius: 8px; padding: 11px; font-weight: 700; font-size: 13px; cursor: pointer; }
  .btn-prev:disabled { opacity: 0.35; cursor: default; }
  .btn-next { flex: 1; border: none; border-radius: 8px; padding: 11px; font-weight: 700; font-size: 13px; cursor: pointer; }
  .btn-next:disabled { opacity: 0.35; cursor: default; }

  /* CUES */
  .cues-screen { display: none; min-height: 100vh; }
  .cue-card { margin: 8px 12px; background: #161b22; border-radius: 10px; border: 1px solid #21262d; padding: 14px; display: flex; align-items: center; gap: 10px; }
  .cue-num { width: 28px; height: 28px; border-radius: 6px; background: rgba(74,222,128,0.15); border: 1px solid rgba(74,222,128,0.3); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 13px; color: #4ade80; flex-shrink: 0; }
  .cue-text { font-size: 14px; font-weight: 700; color: #fff; }
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home-screen">
  <div class="home-header">
    <div class="session-label">U10 Coaching Session</div>
    <h1 class="session-title">Closing Down &<br>Defensive Awareness</h1>
    <div class="session-sub">55 min · 8–12 players · Age 10</div>
    <div class="overall-bar"><div class="overall-fill" id="overall-fill"></div></div>
  </div>
  <div class="phase-list" id="phase-list"></div>
  <div class="home-footer">
    <button class="btn-start" onclick="goToPhase(0)">▶ Start Session</button>
    <button class="btn-cues-home" onclick="showCues()">Cues</button>
  </div>
</div>

<!-- DRILL SCREEN -->
<div id="drill-screen" class="drill-screen">
  <div class="drill-header">
    <button class="back-btn" onclick="showHome()">← All Phases</button>
    <div class="drill-cat" id="drill-cat"></div>
    <div class="drill-title" id="drill-title"></div>
  </div>
  <div class="drill-body">
    <div class="timer-box">
      <svg id="timer-svg" width="110" height="110" viewBox="0 0 110 110">
        <circle cx="55" cy="55" r="48" fill="none" stroke="#21262d" stroke-width="7"/>
        <circle id="timer-ring" cx="55" cy="55" r="48" fill="none" stroke="#4ade80" stroke-width="7"
          stroke-dasharray="301.6" stroke-dashoffset="0" stroke-linecap="round"
          transform="rotate(-90 55 55)" style="transition:stroke-dashoffset 1s linear,stroke 0.5s"/>
        <text id="timer-num" x="55" y="50" text-anchor="middle" fill="#4ade80" font-size="22" font-weight="900">8:00</text>
        <text id="timer-label" x="55" y="68" text-anchor="middle" fill="#8b949e" font-size="10">remaining</text>
      </svg>
      <div class="timer-btns">
        <button class="btn-play" id="btn-play" onclick="toggleTimer()">▶ Start</button>
        <button class="btn-reset" onclick="resetTimer()">↺ Reset</button>
        <button class="btn-cues-drill" onclick="showCues()">Cues</button>
      </div>
    </div>
    <div class="section-head">Pitch Diagram</div>
    <div class="diagram-wrap"><svg id="diagram-svg" width="100%" viewBox="0 0 300 180"></svg></div>
    <div class="section-head">Setup</div>
    <div class="setup-box" id="setup-text"></div>
    <div class="section-head">Coaching Points</div>
    <div id="points-list"></div>
    <div id="prog-section" style="display:none">
      <div class="section-head">Progression</div>
      <div class="prog-box" id="prog-text"></div>
    </div>
  </div>
  <div class="drill-footer">
    <button class="btn-prev" id="btn-prev" onclick="prevPhase()">← Prev</button>
    <button class="btn-next" id="btn-next" onclick="nextPhase()"></button>
  </div>
</div>

<!-- CUES SCREEN -->
<div id="cues-screen" class="cues-screen">
  <div class="drill-header">
    <button class="back-btn" id="cues-back" onclick="backFromCues()">← Back</button>
    <div class="drill-title" style="padding-bottom:12px">Key Coaching Cues</div>
  </div>
  <div id="cues-list" style="padding:4px 0 20px"></div>
</div>

    <line x1="198" y1="54" x2="175" y2="78" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
    <line x1="238" y1="88" x2="170" y2="88" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
    <line x1="198" y1="123" x2="175" y2="100" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
    <line x1="155" y1="136" x2="155" y2="103" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
    <line x1="107" y1="123" x2="132" y2="100" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
    <circle cx="155" cy="88" r="16" fill="#7c3aed" stroke="#a78bfa" stroke-width="2"/>
    <text x="155" y="92" text-anchor="middle" fill="white" font-size="9" font-weight="bold">COACH</text>
    <text x="150" y="152" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">Circle discussion &amp; reflection</text>`
};

let currentPhase = 0;
let timeLeft = 0;
let running = false;
let timerInterval = null;
let prevScreen = "home";

function init() {
  const list = document.getElementById("phase-list");
  list.innerHTML = "";
  PHASES.forEach((p, i) => {
    const card = document.createElement("div");
    card.className = "phase-card";
    card.style.borderLeftColor = p.color;
    card.innerHTML = `
      <div class="phase-num" style="background:${p.color}22;color:${p.color}">${p.num}</div>
      <div class="phase-info">
        <div class="phase-title">${p.title}</div>
        <div class="phase-cat">${p.category}</div>
      </div>
      <div class="phase-mins">${Math.round(p.duration/60)} min</div>
      <div class="phase-arrow">›</div>`;
    card.onclick = () => goToPhase(i);
    list.appendChild(card);
  });

  const cuesList = document.getElementById("cues-list");
  cuesList.innerHTML = "";
  CUES.forEach((c, i) => {
    cuesList.innerHTML += `<div class="cue-card">
      <div class="cue-num">${i+1}</div>
      <div class="cue-text">"${c}"</div>
    </div>`;
  });
}

function showHome() {
  document.getElementById("home-screen").style.display = "block";
  document.getElementById("drill-screen").style.display = "none";
  document.getElementById("cues-screen").style.display = "none";
  stopTimer();
}

function showCues() {
  prevScreen = document.getElementById("drill-screen").style.display === "flex" ? "drill" : "home";
  document.getElementById("home-screen").style.display = "none";
  document.getElementById("drill-screen").style.display = "none";
  document.getElementById("cues-screen").style.display = "block";
}

function backFromCues() {
  document.getElementById("cues-screen").style.display = "none";
  if (prevScreen === "drill") {
    document.getElementById("drill-screen").style.display = "flex";
  } else {
    document.getElementById("home-screen").style.display = "block";
  }
}

function goToPhase(i) {
  stopTimer();
  currentPhase = i;
  timeLeft = PHASES[i].duration;
  running = false;
  renderDrill();
  document.getElementById("home-screen").style.display = "none";
  document.getElementById("cues-screen").style.display = "none";
  document.getElementById("drill-screen").style.display = "flex";
}

function renderDrill() {
  const p = PHASES[currentPhase];
  document.getElementById("drill-cat").textContent = p.category;
  document.getElementById("drill-cat").style.color = p.color;
  document.getElementById("drill-title").textContent = p.title;

  // Diagram
  const svg = document.getElementById("diagram-svg");
  svg.setAttribute("viewBox", p.diagram === "sprintslow" ? "0 0 300 140" : p.diagram === "cooldown" ? "0 0 300 160" : "0 0 300 180");
  svg.innerHTML = DIAGRAMS[p.diagram];

  // Setup
  document.getElementById("setup-text").textContent = p.setup;

  // Points
  const pl = document.getElementById("points-list");
  pl.innerHTML = "";
  p.points.forEach(pt => {
    pl.innerHTML += `<div class="point-row">
      <div class="point-dot" style="background:${p.color}"></div>
      <div class="point-text">${pt}</div>
    </div>`;
  });

  // Progression
  const ps = document.getElementById("prog-section");
  if (p.progression) {
    ps.style.display = "block";
    document.getElementById("prog-text").textContent = "↑ " + p.progression;
  } else {
    ps.style.display = "none";
  }

  // Nav buttons
  document.getElementById("btn-prev").disabled = currentPhase === 0;
  const btnNext = document.getElementById("btn-next");
  btnNext.disabled = false;
  btnNext.textContent = currentPhase === PHASES.length - 1 ? "✓ Complete" : "Next Phase →";
  btnNext.style.background = p.color + "22";
  btnNext.style.color = p.color;
  btnNext.style.border = `1px solid ${p.color}44`;
  if (currentPhase === PHASES.length - 1) btnNext.disabled = true;

  updateTimerUI();
}

function updateTimerUI() {
  const p = PHASES[currentPhase];
  const pct = timeLeft / p.duration;
  const circumference = 2 * Math.PI * 48;
  const offset = circumference * (1 - pct);
  const ring = document.getElementById("timer-ring");
  ring.setAttribute("stroke-dashoffset", offset);
  const color = pct > 0.5 ? p.color : pct > 0.2 ? "#f97316" : "#ef4444";
  ring.setAttribute("stroke", color);
  document.getElementById("timer-num").setAttribute("fill", color);
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  document.getElementById("timer-num").textContent = m + ":" + String(s).padStart(2, "0");
  document.getElementById("timer-label").textContent = timeLeft === 0 ? "DONE" : "remaining";

  const btn = document.getElementById("btn-play");
  if (timeLeft === 0) {
    btn.textContent = "✓ Done";
    btn.style.background = "rgba(74,222,128,0.13)";
    btn.style.color = "#4ade80";
    btn.style.border = "1px solid rgba(74,222,128,0.3)";
  } else if (running) {
    btn.textContent = "⏸ Pause";
    btn.style.background = "rgba(249,115,22,0.13)";
    btn.style.color = "#f97316";
    btn.style.border = "1px solid rgba(249,115,22,0.3)";
  } else {
    btn.textContent = "▶ Start";
    btn.style.background = "rgba(74,222,128,0.13)";
    btn.style.color = "#4ade80";
    btn.style.border = "1px solid rgba(74,222,128,0.3)";
  }

  // Overall progress bar
  const elapsed = PHASES.slice(0, currentPhase).reduce((a, ph) => a + ph.duration, 0) + (p.duration - timeLeft);
  const total = PHASES.reduce((a, ph) => a + ph.duration, 0);
  document.getElementById("overall-fill").style.width = Math.min(100, (elapsed / total) * 100) + "%";
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  running = false;
}

function toggleTimer() {
  if (timeLeft === 0) return;
  running = !running;
  if (running) {
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerUI();
      if (timeLeft === 0) {
        stopTimer();
        updateTimerUI();
        if (currentPhase < PHASES.length - 1) {
          setTimeout(() => goToPhase(currentPhase + 1), 1200);
        }
      }
    }, 1000);
  } else {
    stopTimer();
  }
  updateTimerUI();
}

function resetTimer() {
  stopTimer();
  timeLeft = PHASES[currentPhase].duration;
  updateTimerUI();
}

function prevPhase() { if (currentPhase > 0) goToPhase(currentPhase - 1); }
function nextPhase() { if (currentPhase < PHASES.length - 1) goToPhase(currentPhase + 1); }

init();
</script>
</body>
</html>
